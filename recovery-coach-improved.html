<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebound - AI Recovery Coach</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f17;
        }
        .green-glow {
            box-shadow: 0 0 25px -5px rgba(16, 185, 129, 0.3);
        }
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-input {
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col items-center justify-center p-4 md:p-8">

    <div class="max-w-3xl w-full space-y-6">
        
        <!-- Header Section -->
        <header class="text-center space-y-2">
            <div class="inline-flex items-center space-x-2 bg-emerald-950/60 border border-emerald-500/30 px-4 py-1.5 rounded-full text-emerald-400 text-sm font-semibold tracking-wide uppercase">
                <i class="fa-solid fa-bolt text-emerald-400"></i>
                <span>AI Performance Recovery</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-white">
                REBOUND <span class="text-emerald-400">COACH</span>
            </h1>
            <p class="text-gray-400 text-sm md:text-base max-w-md mx-auto">
                Log today's training metrics to generate your personalized 3-step recovery protocol.
            </p>
        </header>

        <!-- Main Form Card -->
        <div class="glass-card rounded-2xl p-6 md:p-8 space-y-6 shadow-2xl">
            
            <!-- Dynamic Readiness Header -->
            <div class="flex flex-col sm:flex-row items-center justify-between p-4 rounded-xl bg-gray-900/80 border border-emerald-500/20 green-glow gap-4">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                        <i class="fa-solid fa-heart-pulse text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-white text-sm">Estimated Readiness Score</h3>
                        <p class="text-xs text-gray-400">Calculated dynamically from check-in data</p>
                    </div>
                </div>
                <div class="flex items-baseline space-x-1">
                    <span id="scoreDisplay" class="text-3xl font-extrabold text-emerald-400">85</span>
                    <span class="text-gray-500 text-sm font-bold">/100</span>
                </div>
            </div>

            <!-- Form Grid -->
            <form id="recoveryForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    
                    <!-- Activity Input -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold tracking-wider uppercase text-gray-300 flex items-center gap-2">
                            <i class="fa-solid fa-dumbbell text-emerald-400"></i> Activity Today
                        </label>
                        <input type="text" id="activity" required placeholder="e.g. Heavy Squat Session, 5k Run" 
                            class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none transition">
                    </div>

                    <!-- Effort Level -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold tracking-wider uppercase text-gray-300 flex items-center gap-2">
                            <i class="fa-solid fa-gauge-high text-emerald-400"></i> Effort Level
                        </label>
                        <select id="effort" class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white focus:outline-none transition">
                            <option value="1" class="bg-gray-900">1 - Light / Recovery</option>
                            <option value="2" selected class="bg-gray-900">2 - Moderate Effort</option>
                            <option value="3" class="bg-gray-900">3 - All-Out High Intensity</option>
                        </select>
                    </div>

                    <!-- Sleep Hours -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold tracking-wider uppercase text-gray-300 flex items-center gap-2">
                            <i class="fa-solid fa-bed text-emerald-400"></i> Sleep Last Night (Hours)
                        </label>
                        <input type="number" id="sleep" value="7.5" step="0.5" min="2" max="14" required 
                            class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white focus:outline-none transition">
                    </div>

                    <!-- Soreness Level & Area -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold tracking-wider uppercase text-gray-300 flex items-center gap-2">
                            <i class="fa-solid fa-person-dots-from-line text-emerald-400"></i> Soreness & Focus Area
                        </label>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="sore" class="glass-input rounded-xl px-3 py-3 text-sm text-white focus:outline-none transition">
                                <option value="1" class="bg-gray-900">1 - Low</option>
                                <option value="2" selected class="bg-gray-900">2 - Moderate</option>
                                <option value="3" class="bg-gray-900">3 - Severe</option>
                            </select>
                            <input type="text" id="area" required placeholder="Target area (e.g., Quads)" 
                                class="glass-input rounded-xl px-3 py-3 text-sm text-white placeholder-gray-500 focus:outline-none transition">
                        </div>
                    </div>

                    <!-- Stress Level -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold tracking-wider uppercase text-gray-300 flex items-center gap-2">
                            <i class="fa-solid fa-brain text-emerald-400"></i> Stress Level
                        </label>
                        <select id="stress" class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white focus:outline-none transition">
                            <option value="1" class="bg-gray-900">1 - Chill / Low Stress</option>
                            <option value="2" class="bg-gray-900">2 - Elevated / High Stress</option>
                        </select>
                    </div>

                    <!-- Next Scheduled Event -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold tracking-wider uppercase text-gray-300 flex items-center gap-2">
                            <i class="fa-solid fa-calendar-day text-emerald-400"></i> Next Event / Workout
                        </label>
                        <input type="text" id="event" required placeholder="e.g. Match Tomorrow, Rest Day" 
                            class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none transition">
                    </div>

                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" 
                    class="w-full py-4 rounded-xl font-bold text-gray-950 bg-emerald-400 hover:bg-emerald-300 transition duration-200 green-glow flex items-center justify-center space-x-2 text-base uppercase tracking-wider cursor-pointer">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>Generate Recovery Plan</span>
                </button>
            </form>
        </div>

        <!-- AI Output Plan Container -->
        <div id="resultContainer" class="hidden glass-card rounded-2xl p-6 md:p-8 space-y-4 border-l-4 border-emerald-400">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <h2 class="text-lg font-bold text-white">Your Custom Protocol</h2>
                </div>
                <span class="text-xs bg-emerald-500/10 text-emerald-400 font-semibold px-2.5 py-1 rounded-md border border-emerald-500/20">AI Generated</span>
            </div>
            <hr class="border-gray-800">
            <div id="planOutput" class="text-gray-300 leading-relaxed text-sm md:text-base space-y-3 whitespace-pre-line">
                <!-- AI Protocol dynamically populates here -->
            </div>
        </div>

    </div>

    <!-- Application Script -->
    <script>
        const form = document.getElementById('recoveryForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultContainer = document.getElementById('resultContainer');
        const planOutput = document.getElementById('planOutput');
        const scoreDisplay = document.getElementById('scoreDisplay');

        // Dynamic Readiness Score Calculator
        function updateScore() {
            const sleep = parseFloat(document.getElementById('sleep').value) || 7;
            const sore = parseInt(document.getElementById('sore').value) || 1;
            const stress = parseInt(document.getElementById('stress').value) || 1;
            const effort = parseInt(document.getElementById('effort').value) || 2;

            let score = Math.round((sleep * 8.5) + (100 - (sore * 15)) - (stress * 10) - (effort * 5));
            score = Math.max(15, Math.min(99, score)); // Keep within realistic range
            
            scoreDisplay.textContent = score;
            return score;
        }

        // Event listeners to update score live
        ['sleep', 'sore', 'stress', 'effort'].forEach(id => {
            document.getElementById(id).addEventListener('change', updateScore);
            document.getElementById(id).addEventListener('input', updateScore);
        });

        // Form Submit Handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const calculatedScore = updateScore();

            const payload = {
                activity: document.getElementById('activity').value,
                effort: document.getElementById('effort').value,
                sleep: document.getElementById('sleep').value,
                sore: document.getElementById('sore').value,
                area: document.getElementById('area').value,
                stress: document.getElementById('stress').value,
                event: document.getElementById('event').value,
                score: calculatedScore
            };

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i><span>Analyzing Recovery Data...</span>`;
            resultContainer.classList.add('hidden');

            try {
                const response = await fetch('/api/recovery-plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                planOutput.textContent = data.plan;
                resultContainer.classList.remove('hidden');
                
                // Smooth scroll to results
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            } catch (err) {
                planOutput.textContent = "Unable to generate plan right now. Please check your network connection and try again.";
                resultContainer.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i><span>Generate Recovery Plan</span>`;
            }
        });

        // Initialize score on page load
        updateScore();
    </script>
</body>
</html>
